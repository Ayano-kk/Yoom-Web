<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客户案例 - 沄荣科技</title>
  <link rel="stylesheet" href="../css/common.css" />
  <!-- Inline styles kept as specific to this page architecture for now, could move to cases.css but user asked for architecture change mainly for files, extracted JS already. -->
  <style>
    /* 复用 View.html 的头部渐变风格，但高度较小 */
    .page-header {
      background: linear-gradient(135deg, #0066ff 0%, #0044cc 100%);
      color: white;
      padding: 4rem 0 3rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h2 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    /* 筛选器样式 */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #f5f7fa;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 20px;
      cursor: pointer;
      color: #666;
      transition: all 0.3s;
      font-weight: 500;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #0066ff;
      color: white;
      box-shadow: 0 4px 10px rgba(0, 102, 255, 0.3);
    }

    /* 案例卡片网格布局 */
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
      padding-bottom: 4rem;
    }

    /* 卡片设计 */
    .case-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
      transition:
        transform 0.3s,
        box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      /* 移除链接下划线 */
      color: inherit;
    }

    .case-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      border-color: #0066ff;
    }

    .case-card-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* 行业标签 */
    .industry-badge {
      display: inline-block;
      background: #e8f0fe;
      color: #0066ff;
      font-size: 0.8rem;
      padding: 0.2rem 0.8rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      align-self: flex-start;
    }

    .case-card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .case-card-subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.5;
      flex-grow: 1;
      /* 撑开高度，保证底部对齐 */
    }

    /* 核心指标区域 - 模仿 View.html 的风格 */
    .case-metrics {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      /* 推到底部 */
    }

    .metric-item {
      text-align: center;
      flex: 1;
      border-right: 1px solid #eee;
    }

    .metric-item:last-child {
      border-right: none;
    }

    .metric-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0066ff;
      display: block;
    }

    .metric-label {
      font-size: 0.75rem;
      color: #888;
    }

    /* 卡片底部 */
    .case-card-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #666;
    }

    .read-more {
      color: #0066ff;
      font-weight: 600;
      display: flex;
      align-items: center;
    }

    .read-more::after {
      content: '→';
      margin-left: 4px;
      transition: margin 0.2s;
    }

    .case-card:hover .read-more::after {
      margin-left: 8px;
    }

    @media (max-width: 768px) {
      .cases-grid {
        grid-template-columns: 1fr;
      }

      .page-header {
        padding: 3rem 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- 导航栏占位符 -->
  <div id="header-placeholder"></div>

  <div class="page-header">
    <div class="container">
      <h2>客户成功案例</h2>
      <p>看看领先企业如何利用沄荣科技 AI 实现智能化转型</p>
    </div>
  </div>

  <section class="cases-section">
    <div class="container">
      <div class="filter-bar" id="filter-container">
        <button class="filter-btn active" data-filter="all">全部案例</button>
      </div>

      <div class="cases-grid" id="cases-grid">
        <p style="text-align: center; width: 100%; grid-column: 1/-1">
          正在加载案例...
        </p>
      </div>
    </div>
  </section>

  <!-- 页脚占位符 -->
  <div id="footer-placeholder"></div>

  <script src="../js/components-loader.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/cases.js"></script>
</body>

</html>
