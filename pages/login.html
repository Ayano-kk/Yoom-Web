<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 沄荣科技官网</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <!-- 导航栏占位符 -->
    <div id="header-placeholder"></div>

    <!-- 登录页面内容 -->
    <section class="login">
        <div class="container">
            <div class="login-card">
                <div class="login-logo">
                    <h2>沄荣科技</h2>
                    <p>企业AI智能体开发和场景应用平台</p>
                </div>
                <form class="login-form">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="用户名" class="form-input">
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="密码" class="form-input">
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="remember" class="form-checkbox">
                        <label for="remember" class="form-label">记住密码</label>
                    </div>
                    <button type="submit" class="btn btn-primary login-btn">登录</button>
                    <div class="login-footer">
                        <a href="https://ai-form.xiaohuodui.cn/s/Q3pdh3nT" class="free-trial" target="_blank">免费试用</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚占位符 -->
    <div id="footer-placeholder"></div>

    <script src="../js/components-loader.js"></script>
    <script src="../js/common.js"></script>
</body>

</html>
