<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <!-- 保持与原脚本一致的相对路径 -->
    <link rel="stylesheet" href="../../css/common.css">
    <!-- <link rel="stylesheet" href="../../css/blog.css"> Optional if we decide to move detail styles there, but for now mostly inline -->
    <style>
        /* 保持原有的内联样式 */
        .article-header-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 2rem;
        }

        .article-container {
            display: flex;
            gap: 2rem;
            margin: 0 auto;
            max-width: 1200px;
            padding: 0 1rem;
        }

        .article-main {
            flex: 1;
            max-width: 800px;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            color: #666;
            font-size: 0.9rem;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .article-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .article-content {
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .article-tag {
            background-color: #f0f0f0;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #666;
        }

        .article-sidebar {
            width: 300px;
            position: sticky;
            top: 2rem;
            align-self: flex-start;
        }

        .service-promotion {
            background-color: #0066ff;
            color: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .service-promotion h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .service-promotion p {
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        @media (max-width: 992px) {
            .article-container {
                flex-direction: column;
            }

            .article-sidebar {
                width: 100%;
                position: static;
            }
        }

        @media (max-width: 768px) {
            .article-header-image {
                height: 250px;
            }

            .article-title {
                font-size: 1.5rem;
            }

            .article-meta {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }

        /* 加载状态样式 */
        #loading-overlay {
            display: none;
            text-align: center;
            padding: 50px;
            color: #666;
        }

        #error-msg {
            color: red;
            text-align: center;
            display: none;
            padding: 20px;
        }
    </style>
</head>

<body>
    <!-- 导航栏占位符 -->
    <div id="header-placeholder"></div>

    <!-- 错误提示 -->
    <div id="error-msg"></div>

    <!-- 文章内容 -->
    <main class="article" id="main-content" style="opacity: 0; transition: opacity 0.3s;">
        <img src="../../images/blog-details-01.jpg" alt="文章头部图片" class="article-header-image">

        <div class="article-container">
            <div class="article-main">
                <!-- 动态填充：标题 -->
                <h1 class="article-title" id="dynamic-title">加载中...</h1>

                <div class="article-meta">
                    <div class="author-info">
                        <div class="author-avatar">积</div>
                        <span>By 沄荣科技</span>
                    </div>
                    <!-- 动态填充：日期 -->
                    <span id="dynamic-date">...</span>
                    <span>阅读 613</span>
                    <span>评论 42</span>
                </div>

                <!-- 动态填充：正文 -->
                <div class="article-content" id="dynamic-content">
                    正在获取内容...
                </div>

                <!-- 动态填充：标签 -->
                <div class="article-tags" id="dynamic-tags">
                </div>
            </div>

            <aside class="article-sidebar">
                <div class="service-promotion">
                    <h3>企业级 AI 智能体开发和场景应用平台</h3>
                    <p>快速部署具备商业价值的 AI 助手，并发布至企业应用场景中。</p>
                    <a href="https://ai-form.xiaohuodui.cn/s/Q3pdh3nT" class="btn btn-light"
                        style="width: 100%; margin-bottom: 0.5rem; display: block; text-align: center;"
                        target="_blank">预约演示</a>
                    <a href="../contact.html" class="btn btn-light"
                        style="width: 100%; display: block; text-align: center;">联系我们</a>
                </div>
            </aside>
        </div>
    </main>

    <!-- 页脚占位符 -->
    <div id="footer-placeholder"></div>

    <script src="../../js/components-loader.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/blog-detail.js"></script>
</body>

</html>
